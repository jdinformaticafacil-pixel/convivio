<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Convivio — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1A8C68;--green-light:#E8F5F0;--green-mid:#4DB892;
  --text:#1A1A18;--muted:#6B6B67;--border:#E2E2DC;
  --bg:#FAFAF7;--white:#FFFFFF;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:400}
.logo span{color:var(--green)}
.top-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:3px}
.top-tab{padding:5px 16px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:400;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.top-tab.active{background:var(--white);color:var(--text);font-weight:500;border:1px solid var(--border)}
.top-avatar{width:32px;height:32px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}

/* LAYOUT */
.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── SWIPE ── */
.swipe-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;position:relative}
.card-stack{position:relative;width:100%;max-width:360px;height:500px}
.swipe-card{position:absolute;inset:0;background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:grab;user-select:none;transition:transform .25s ease,opacity .25s ease;will-change:transform}
.swipe-card:nth-child(2){transform:scale(.96) translateY(12px);z-index:1;pointer-events:none}
.swipe-card:nth-child(3){transform:scale(.92) translateY(24px);z-index:0;pointer-events:none}
.swipe-card.top{z-index:2}
.swipe-card.go-left{transform:translateX(-130%) rotate(-18deg)!important;opacity:0}
.swipe-card.go-right{transform:translateX(130%) rotate(18deg)!important;opacity:0}
.card-photo{height:260px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:88px;position:relative}
.card-compat{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--green)}
.card-info{padding:18px}
.card-name{font-family:'Fraunces',serif;font-size:22px;font-weight:400;margin-bottom:2px}
.card-role{font-size:13px;color:var(--muted);margin-bottom:12px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:12px;padding:4px 10px;border-radius:12px;background:var(--green-light);color:var(--green)}
.card-bio{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.card-budget{font-size:14px;font-weight:500}
.card-budget span{font-weight:400;color:var(--muted);font-size:13px}

/* LIKE/PASS indicator */
.like-indicator{position:absolute;top:28px;left:20px;font-size:15px;font-weight:700;color:#1A8C68;border:3px solid #1A8C68;border-radius:8px;padding:4px 12px;opacity:0;transform:rotate(-15deg);z-index:10;pointer-events:none;transition:opacity .1s}
.pass-indicator{position:absolute;top:28px;right:20px;font-size:15px;font-weight:700;color:#E24B4A;border:3px solid #E24B4A;border-radius:8px;padding:4px 12px;opacity:0;transform:rotate(15deg);z-index:10;pointer-events:none;transition:opacity .1s}

.action-row{display:flex;justify-content:center;align-items:center;gap:16px;padding:16px 0 8px}
.btn-act{border:1px solid var(--border);border-radius:50%;background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-act:active{transform:scale(.92)}
.btn-pass{width:54px;height:54px;font-size:20px;color:#E24B4A;border-color:#F7C1C1}
.btn-pass:hover{background:#FCEBEB}
.btn-like{width:62px;height:62px;font-size:24px;color:var(--green);border-color:#9FE1CB}
.btn-like:hover{background:var(--green-light)}
.btn-super{width:48px;height:48px;font-size:18px;color:#378ADD;border-color:#B5D4F4}
.btn-super:hover{background:#E6F1FB}
.btn-undo{width:44px;height:44px;font-size:16px;color:var(--muted)}

/* MATCH POPUP */
.match-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.match-overlay.show{display:flex}
.match-box{background:var(--white);border-radius:20px;padding:32px 28px;text-align:center;max-width:300px;width:90%;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.match-emoji{font-size:52px;margin-bottom:12px}
.match-title{font-family:'Fraunces',serif;font-size:26px;color:var(--green);margin-bottom:6px}
.match-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.btn-chat-now{background:var(--green);color:#fff;border:none;border-radius:24px;padding:12px 28px;font-size:15px;font-weight:500;cursor:pointer;width:100%;margin-bottom:8px;font-family:'DM Sans',sans-serif}
.btn-keep{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── PISOS ── */
.filter-bar{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .12s}
.fchip.on{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}
.pisos-scroll{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:12px}
.piso-item{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;cursor:pointer;transition:border-color .15s}
.piso-item:hover{border-color:var(--green-mid)}
.piso-thumb{width:110px;min-height:90px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.piso-data{padding:12px 14px;flex:1}
.piso-name{font-size:14px;font-weight:500;margin-bottom:3px}
.piso-loc{font-size:12px;color:var(--muted);margin-bottom:8px}
.piso-row{display:flex;align-items:center;justify-content:space-between}
.piso-price{font-family:'Fraunces',serif;font-size:17px}
.piso-price small{font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted)}
.piso-tags-row{display:flex;gap:5px}

/* ── MATCHES ── */
.matches-scroll{flex:1;overflow-y:auto;padding:12px 16px}
.match-section-title{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.5px;margin:16px 0 10px}
.new-matches{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:8px}
.new-matches::-webkit-scrollbar{display:none}
.new-match-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.nm-avatar{width:60px;height:60px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--green-light);position:relative}
.nm-dot{position:absolute;bottom:0;right:0;width:14px;height:14px;border-radius:50%;background:var(--green);border:2px solid var(--white)}
.nm-name{font-size:12px;color:var(--text);font-weight:500;text-align:center}
.conv-list{display:flex;flex-direction:column;gap:2px}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:var(--radius);cursor:pointer;transition:background .12s}
.conv-item:hover{background:var(--bg)}
.conv-avatar{width:46px;height:46px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative}
.conv-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--green);font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--white)}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:14px;font-weight:500}
.conv-preview{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-time{font-size:12px;color:var(--muted);flex-shrink:0}

/* ── CHAT ── */
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-back{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);padding:0 8px 0 0}
.ch-avatar{width:38px;height:38px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px}
.ch-name{font-size:15px;font-weight:500}
.ch-status{font-size:12px;color:var(--green)}
.msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:74%;padding:9px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.msg-them{background:var(--white);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px;color:var(--text)}
.msg-me{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-time{font-size:11px;opacity:.6;margin-top:3px}
.msg-them .msg-time{color:var(--muted)}
.msg-me .msg-time{color:rgba(255,255,255,.7)}
.chat-input-bar{padding:10px 14px 16px;display:flex;gap:8px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input-bar input{flex:1;border:1px solid var(--border);border-radius:22px;padding:9px 15px;font-size:14px;background:var(--white);color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.chat-input-bar input:focus{border-color:var(--green-mid)}
.btn-send{width:40px;height:40px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}

/* BOTTOM NAV (móvil) */
.bottom-nav{display:none;background:var(--white);border-top:1px solid var(--border);padding:8px 0 env(safe-area-inset-bottom);flex-shrink:0}
.bnav-inner{display:flex;justify-content:space-around}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 12px;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;position:relative}
.bnav-btn.active{color:var(--green)}
.bnav-icon{font-size:22px}
.bnav-badge{position:absolute;top:0;right:8px;width:16px;height:16px;border-radius:50%;background:var(--green);font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center}

@media(max-width:640px){
  .top-tabs{display:none}
  .bottom-nav{display:block}
  .swipe-wrap{padding:10px}
  .card-stack{max-width:100%;height:calc(100dvh - 56px - 72px - 100px)}
  .card-photo{height:200px;font-size:64px}
  .swipe-card{border-radius:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">con<span>vivio</span></a>
  <div class="top-tabs">
    <button class="top-tab active" onclick="showScreen('swipe',this)">Conocer</button>
    <button class="top-tab" onclick="showScreen('pisos',this)">Pisos</button>
    <button class="top-tab" onclick="showScreen('matches',this)">Matches</button>
  </div>
  <div class="top-avatar" onclick="showScreen('perfil',this)">👤</div>
</div>

<div class="app-body">

  <!-- SWIPE -->
  <div class="screen active" id="screen-swipe">
    <div class="swipe-wrap">
      <div class="card-stack" id="cardStack">
        <!-- cards rendered by JS -->
      </div>
      <div class="action-row">
        <button class="btn-act btn-undo" onclick="undoSwipe()" title="Deshacer">↩</button>
        <button class="btn-act btn-pass" onclick="swipe('left')" title="Pasar">✕</button>
        <button class="btn-act btn-like" onclick="swipe('right')" title="Me gusta">♥</button>
        <button class="btn-act btn-super" onclick="swipe('super')" title="Super like">★</button>
      </div>
    </div>
  </div>

  <!-- PISOS -->
  <div class="screen" id="screen-pisos">
    <div class="filter-bar">
      <button class="fchip on" onclick="fc(this)">Todo</button>
      <button class="fchip" onclick="fc(this)">Habitación</button>
      <button class="fchip" onclick="fc(this)">Piso completo</button>
      <button class="fchip" onclick="fc(this)">Mascotas ok</button>
      <button class="fchip" onclick="fc(this)">Pareja ok</button>
      <button class="fchip" onclick="fc(this)">Menos de 400€</button>
    </div>
    <div class="pisos-scroll" id="pisosList"></div>
  </div>

  <!-- MATCHES -->
  <div class="screen" id="screen-matches">
    <div class="matches-scroll">
      <div class="match-section-title">NUEVOS MATCHES</div>
      <div class="new-matches" id="newMatchesList"></div>
      <div class="match-section-title">CONVERSACIONES</div>
      <div class="conv-list" id="convList"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="screen" id="screen-chat">
    <div class="chat-header">
      <button class="ch-back" onclick="showScreen('matches',null)">←</button>
      <div class="ch-avatar" id="chatAvatar">🧑‍🎨</div>
      <div>
        <div class="ch-name" id="chatName">Lucía</div>
        <div class="ch-status">En línea</div>
      </div>
    </div>
    <div class="msgs" id="msgsList"></div>
    <div class="chat-input-bar">
      <input type="text" id="msgInput" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn-send" onclick="sendMsg()">➤</button>
    </div>
  </div>

</div>

<!-- BOTTOM NAV (móvil) -->
<div class="bottom-nav">
  <div class="bnav-inner">
    <button class="bnav-btn active" id="bnav-swipe" onclick="showScreenMobile('swipe',this)">
      <span class="bnav-icon">🔄</span>Conocer
    </button>
    <button class="bnav-btn" id="bnav-pisos" onclick="showScreenMobile('pisos',this)">
      <span class="bnav-icon">🏠</span>Pisos
    </button>
    <button class="bnav-btn" id="bnav-matches" onclick="showScreenMobile('matches',this)">
      <span class="bnav-icon">💬</span>Matches
      <span class="bnav-badge">2</span>
    </button>
    <button class="bnav-btn" id="bnav-perfil" onclick="showScreenMobile('perfil',this)">
      <span class="bnav-icon">👤</span>Perfil
    </button>
  </div>
</div>

<!-- MATCH POPUP -->
<div class="match-overlay" id="matchOverlay">
  <div class="match-box">
    <div class="match-emoji">🎉</div>
    <div class="match-title">¡Match!</div>
    <div class="match-sub" id="matchSubText">Os gustáis mutuamente. ¡Empieza la conversación!</div>
    <button class="btn-chat-now" onclick="goToChat()">Enviar mensaje</button>
    <button class="btn-keep" onclick="closeMatch()">Seguir explorando</button>
  </div>
</div>

<script>
const profiles=[
  {name:'Lucía',age:26,role:'Diseñadora · Madrid',emoji:'🧑‍🎨',bio:'Busco piso tranquilo cerca del metro. Madrugadora, ordenada y tengo gato.',budget:'400–500€/mes',tags:['Ordenada','No fumo','Gato','Madrugadora'],compat:96},
  {name:'Marcos',age:29,role:'Ingeniero · Barcelona',emoji:'👨‍💻',bio:'Trabajo desde casa, busco buena conexión y ambiente tranquilo.',budget:'500–650€/mes',tags:['WFH','Gym','Cocina','Sin fiestas'],compat:88},
  {name:'Sara',age:24,role:'Estudiante · Valencia',emoji:'👩‍🎓',bio:'Erasmus 6 meses. Busco ambiente internacional y gente abierta.',budget:'300–400€/mes',tags:['Erasmus','Flexible','Internacional'],compat:79},
  {name:'Iván',age:32,role:'Chef · Sevilla',emoji:'👨‍🍳',bio:'Horario nocturno. Busco compañeros respetuosos con el descanso.',budget:'350–450€/mes',tags:['Nocturno','Cocina','Tranquilo'],compat:72},
  {name:'Paula',age:27,role:'Médica · Bilbao',emoji:'👩‍⚕️',bio:'Residente de medicina, poco tiempo en casa. Busco piso limpio y céntrico.',budget:'500–600€/mes',tags:['Profesional','Limpieza','Tranquila'],compat:91},
];
const pisos=[
  {emoji:'🏠',tipo:'Habitación',name:'Habitación en Malasaña',loc:'Madrid · Metro Bilbao 5 min',price:490,tags:['2 comp.','Wi-Fi']},
  {emoji:'🏢',tipo:'Piso completo',name:'Piso en Gràcia',loc:'Barcelona · Amueblado, terraza',price:1200,tags:['2 hab.','Pareja ok']},
  {emoji:'🛏',tipo:'Habitación',name:'Hab. doble en Ruzafa',loc:'Valencia · Zona estudiantes',price:320,tags:['Mascotas ok','Mixto']},
  {emoji:'🌿',tipo:'Habitación',name:'Ático con terraza',loc:'Sevilla · Centro histórico',price:430,tags:['3 comp.','Soleado']},
  {emoji:'🏙',tipo:'Estudio',name:'Estudio individual',loc:'Madrid · Lavapiés',price:680,tags:['Solo','Amueblado']},
];
const matchesList=[
  {emoji:'🧑‍🎨',name:'Lucía',preview:'¿Cuándo puedes ver el piso?',time:'2m',isNew:true,unread:2},
  {emoji:'👨‍💻',name:'Marcos',preview:'La fibra es de 600MB, sin problema',time:'1h',isNew:true,unread:0},
  {emoji:'👩‍🎓',name:'Sara',preview:'Hola! Soy de intercambio...',time:'1d',isNew:false,unread:0},
];
const chats={
  'Lucía':[
    {me:false,text:'¡Hola! Vi tu perfil y creo que encajaríamos bien 😊',time:'12:30'},
    {me:true,text:'¡Hola Lucía! Me parece genial, yo también tengo gato jeje',time:'12:31'},
    {me:false,text:'¿Cómo se llama? El mío es Mochi 🐱',time:'12:32'},
    {me:true,text:'El mío se llama Bruno. ¿Cuándo puedes ver el piso?',time:'12:33'},
  ],
  'Marcos':[
    {me:false,text:'Hola! Vi que buscas habitación cerca de Gràcia',time:'10:00'},
    {me:true,text:'Sí exacto. ¿Tienes buena fibra en el piso?',time:'10:05'},
    {me:false,text:'La fibra es de 600MB, sin problema',time:'10:06'},
  ],
  'Sara':[
    {me:false,text:'Hola! Soy de intercambio, ¿tienes habitación libre?',time:'Ayer'},
  ],
};

let cardIdx=0;
let lastSwipe=null;
let activeChatPerson='Lucía';

function buildCards(){
  const stack=document.getElementById('cardStack');
  stack.innerHTML='';
  const show=profiles.slice(cardIdx,cardIdx+3);
  show.reverse().forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='swipe-card'+(i===show.length-1?' top':'');
    div.dataset.name=p.name;
    div.innerHTML=`
      <div class="like-indicator">LIKE</div>
      <div class="pass-indicator">PASS</div>
      <div class="card-photo">${p.emoji}<span class="card-compat">⚡ ${p.compat}% compatible</span></div>
      <div class="card-info">
        <div class="card-name">${p.name}, ${p.age}</div>
        <div class="card-role">${p.role}</div>
        <div class="card-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-bio">${p.bio}</div>
        <div class="card-budget">🏠 ${p.budget}</div>
      </div>`;
    stack.appendChild(div);

    if(i===show.length-1){
      let startX=0,dx=0,dragging=false;
      const onStart=e=>{startX=e.touches?e.touches[0].clientX:e.clientX;dragging=true};
      const onMove=e=>{
        if(!dragging)return;
        dx=(e.touches?e.touches[0].clientX:e.clientX)-startX;
        div.style.transform=`translateX(${dx}px) rotate(${dx*.04}deg)`;
        div.querySelector('.like-indicator').style.opacity=Math.max(0,dx/80);
        div.querySelector('.pass-indicator').style.opacity=Math.max(0,-dx/80);
      };
      const onEnd=()=>{
        dragging=false;
        div.style.transform='';
        div.querySelector('.like-indicator').style.opacity=0;
        div.querySelector('.pass-indicator').style.opacity=0;
        if(dx>80)swipe('right');
        else if(dx<-80)swipe('left');
        dx=0;
      };
      div.addEventListener('mousedown',onStart);div.addEventListener('touchstart',onStart,{passive:true});
      window.addEventListener('mousemove',onMove);window.addEventListener('touchmove',onMove,{passive:true});
      window.addEventListener('mouseup',onEnd);window.addEventListener('touchend',onEnd);
    }
  });
}

function swipe(dir){
  const top=document.querySelector('.swipe-card.top');
  if(!top)return;
  lastSwipe={idx:cardIdx,dir};
  top.classList.add(dir==='right'||dir==='super'?'go-right':'go-left');
  const liked=dir==='right'||dir==='super';
  setTimeout(()=>{
    cardIdx++;
    buildCards();
    if(liked&&Math.random()>.4){
      const p=profiles[cardIdx-1];
      if(p){
        document.getElementById('matchSubText').textContent=`Tú y ${p.name} os gustáis mutuamente. ¡Empieza la conversación!`;
        document.getElementById('matchOverlay').classList.add('show');
      }
    }
  },280);
}
function undoSwipe(){if(lastSwipe&&lastSwipe.idx<cardIdx){cardIdx=lastSwipe.idx;buildCards();lastSwipe=null;}}
function closeMatch(){document.getElementById('matchOverlay').classList.remove('show');}
function goToChat(){closeMatch();activeChatPerson='Lucía';showScreen('chat',null);renderChat();}

function renderPisos(){
  document.getElementById('pisosList').innerHTML=pisos.map(p=>`
    <div class="piso-item">
      <div class="piso-thumb">${p.emoji}</div>
      <div class="piso-data">
        <div style="font-size:11px;color:var(--green);margin-bottom:3px">${p.tipo}</div>
        <div class="piso-name">${p.name}</div>
        <div class="piso-loc">📍 ${p.loc}</div>
        <div class="piso-row">
          <div class="piso-price">${p.price}€ <small>/mes</small></div>
          <div class="piso-tags-row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    </div>`).join('');
}

function renderMatches(){
  document.getElementById('newMatchesList').innerHTML=matchesList.filter(m=>m.isNew).map(m=>`
    <div class="new-match-item" onclick="openChat('${m.name}','${m.emoji}')">
      <div class="nm-avatar">${m.emoji}<span class="nm-dot"></span></div>
      <div class="nm-name">${m.name}</div>
    </div>`).join('');
  document.getElementById('convList').innerHTML=matchesList.map(m=>`
    <div class="conv-item" onclick="openChat('${m.name}','${m.emoji}')">
      <div class="conv-avatar">${m.emoji}${m.unread?`<span class="conv-badge">${m.unread}</span>`:''}</div>
      <div class="conv-info">
        <div class="conv-name">${m.name}</div>
        <div class="conv-preview">${m.preview}</div>
      </div>
      <div class="conv-time">${m.time}</div>
    </div>`).join('');
}

function openChat(name,emoji){
  activeChatPerson=name;
  document.getElementById('chatAvatar').textContent=emoji;
  document.getElementById('chatName').textContent=name;
  showScreen('chat',null);
  renderChat();
}

function renderChat(){
  const msgs=chats[activeChatPerson]||[];
  document.getElementById('msgsList').innerHTML=msgs.map(m=>`
    <div class="msg ${m.me?'msg-me':'msg-them'}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('');
  const el=document.getElementById('msgsList');
  el.scrollTop=el.scrollHeight;
}
function sendMsg(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();if(!text)return;
  if(!chats[activeChatPerson])chats[activeChatPerson]=[];
  const now=new Date();
  const time=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  chats[activeChatPerson].push({me:true,text,time});
  inp.value='';renderChat();
  setTimeout(()=>{
    const replies=['¡Perfecto! Te escribo mañana 😊','Genial, ¿tienes WhatsApp?','Ok! ¿Quedamos para ver el piso esta semana?','Entendido 👍'];
    chats[activeChatPerson].push({me:false,text:replies[Math.floor(Math.random()*replies.length)],time});
    renderChat();
  },1000);
}

function showScreen(id,tabEl){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const s=document.getElementById('screen-'+id);
  if(s)s.classList.add('active');
  document.querySelectorAll('.top-tab').forEach(t=>t.classList.remove('active'));
  if(tabEl)tabEl.classList.add('active');
  if(id==='pisos')renderPisos();
  if(id==='matches')renderMatches();
}
function showScreenMobile(id,btn){
  showScreen(id,null);
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(id==='pisos')renderPisos();
  if(id==='matches')renderMatches();
}
function fc(el){document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));el.classList.add('on');}

buildCards();
</script>
</body>
</html>
